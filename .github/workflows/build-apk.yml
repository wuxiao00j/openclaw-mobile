name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Prepare Placeholder Environment
      run: |
        mkdir -p app/src/main/assets/
        # Create minimal placeholder environment
        mkdir -p temp_env/nodejs/bin temp_env/openclaw/node_modules/openclaw/dist
        echo '#!/system/bin/sh' > temp_env/nodejs/bin/node
        echo 'echo "Node.js Placeholder"' >> temp_env/nodejs/bin/node
        chmod +x temp_env/nodejs/bin/node
        
        echo 'console.log("OpenClaw Placeholder");' > temp_env/openclaw/node_modules/openclaw/dist/index.js
        echo '#!/system/bin/sh' > temp_env/openclaw/start.sh
        chmod +x temp_env/openclaw/start.sh
        
        cd temp_env && zip -r ../app/src/main/assets/environment.zip . && cd ..
        rm -rf temp_env
        echo "✓ Placeholder environment created"
        ls -lh app/src/main/assets/environment.zip
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: openclaw-mobile-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
